<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Профіль адміністратора</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Oswald&family=Lato&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Lato', sans-serif;
      margin: 0;
      background: url(https://static.vecteezy.com/system/resources/previews/034/707/570/non_2x/ai-generated-ancient-greek-temple-free-photo.jpg) no-repeat center center fixed;
      background-size: cover;
    }
    header {
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 1em;
      text-align: center;
      font-family: 'Oswald', sans-serif;
    }
    .container {
      max-width: 1000px;
      margin: 2em auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .section {
      margin-bottom: 2.5em;
    }
    input, textarea, select, button {
      padding: 0.6em;
      margin: 0.5em 0;
      display: block;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    h2 {
      font-family: 'Oswald', sans-serif;
    }
    .logout-btn {
      position: absolute;
      top: 1em;
      right: 1em;
      padding: 0.4em 0.8em;
      font-size: 0.9em;
      background: transparent;
      border: 1px solid white;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      width: auto; /* <--- ось це прибирає розтягування */
    }
    .logout-btn:hover {
      background: white;
      color: black;
    }


  </style>
</head>
<body>

<header>
  <h1>Профіль адміністратора</h1>
  <button onclick="logout()" class="logout-btn">Вийти</button>

</header>

<div class="container">

  <!-- Додавання користувача -->
  <div class="section">
    <h2>Додати користувача</h2>
    <input type="text" id="FullName" placeholder="ПІБ">
    <input type="email" id="Email" placeholder="Email">
    <input type="password" id="PasswordHash" placeholder="Пароль">
    <select id="Role">
      <option value="Student">Студент</option>
      <option value="Teacher">Викладач</option>
    </select>
    <button onclick="addUser()">Додати</button>
  </div>

  <!-- Перегляд користувачів -->
  <div class="section">
    <h2>Користувачі</h2>
    <select id="filterRole" onchange="filterUsers()">
      <option value="All">Усі</option>
      <option value="Student">Тільки студенти</option>
      <option value="Teacher">Тільки викладачі</option>
    </select>
    <div id="userList">
      <!-- Динамічний список користувачів -->
    </div>
  </div>

  <!-- Створення курсу -->
  <div class="section">
    <h2>Створити курс</h2>
    <input type="text" id="courseName" placeholder="Назва курсу">
    <textarea id="courseDescription" placeholder="Короткий опис курсу"></textarea>

    <input type="email" id="courseTeacher" placeholder="Email викладача">
    <textarea id="courseStudents" placeholder="Email студентів (по одному на рядок)"></textarea>
    <button onclick="createCourse()">Створити курс</button>
  </div>

  <!-- Видалення курсу -->
  <div class="section">
    <h2>Видалити курс</h2>
    <select id="courseSelect">
      loadCourses(); <!-- Курси підставляються автоматично -->
    </select>
    <button onclick="deleteCourse()">Видалити курс</button>
  </div>


</div>

<script>
    function addUser() {
    const fullName = document.getElementById('FullName').value.trim();
    const email = document.getElementById('Email').value.trim();
    const password = document.getElementById('PasswordHash').value.trim();
    const role = document.getElementById('Role').value;

    if (!fullName || !email || !password) {
    alert('Будь ласка, заповніть усі поля');
    return;
  }

    // Формуємо дані як URL-параметри
    const params = new URLSearchParams();
    params.append("FullName", fullName);
    params.append("Email", email);
    params.append("PasswordHash", password);
    params.append("Role", role);

    // Надсилаємо POST-запит до сервлета
    fetch('/proba_war_exploded/admin/addUser', {
    method: 'POST',
    headers: {
    'Content-Type': 'application/x-www-form-urlencoded'
  },
    body: params
  })
    .then(response => response.text())
    .then(data => {
    alert(data || "Користувача додано");
    // За потреби: очистити поля
    document.getElementById('FullName').value = '';
    document.getElementById('Email').value = '';
    document.getElementById('PasswordHash').value = '';
  })
    .catch(error => {
    console.error('Помилка:', error);
    alert('Помилка при додаванні користувача');
  });
  }


    function createCourse() {
      const name = document.getElementById('courseName').value.trim();
      const desc = document.getElementById('courseDescription').value.trim();
      const teacher = document.getElementById('courseTeacher').value.trim();
      const studentsRaw = document.getElementById('courseStudents').value.trim();

      const students = studentsRaw.split('\n').map(email => email.trim()).filter(email => email !== '');

      if (!name || !desc || !teacher || students.length === 0) {
        alert('Усі поля обов’язкові');
        return;
      }

      fetch('/proba_war_exploded/admin/createCourse', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: name,
          description: desc,
          teacherEmail: teacher,
          students: students
        })
      })
              .then(response => {
                if (response.ok) {
                  alert('Курс успішно створено');
                } else {
                  return response.text().then(text => {
                    throw new Error(text || 'Помилка сервера');
                  });
                }
              })
              .catch(error => {
                console.error('Помилка при створенні курсу:', error);
                alert('Помилка при створенні курсу: ' + error.message);
              });
    }



    function deleteCourse() {
      const courseId = document.getElementById('courseSelect').value;

      if (!courseId) {
        alert('Будь ласка, виберіть курс для видалення.');
        return;
      }

      const params = new URLSearchParams();
      params.append("courseId", courseId);

      fetch('/proba_war_exploded/admin/deleteCourse', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params
      })
              .then(response => {
                if (response.ok) {
                  alert('Курс успішно видалено');
                  // TODO: перезавантажити список курсів
                } else {
                  return response.text().then(text => { throw new Error(text); });
                }
              })
              .catch(error => {
                console.error('Помилка при видаленні курсу:', error);
                alert('Не вдалося видалити курс: ' + error.message);
              });
    }
    document.addEventListener("DOMContentLoaded", () => {
      filterUsers();
      loadCourses(); // Викликає завантаження курсів при старті
    });
    function loadCourses() {
      const courseSelect = document.getElementById("courseSelect");
      courseSelect.innerHTML = ""; // очищення перед завантаженням

      fetch("/proba_war_exploded/admin/getCourses")
              .then(response => {
                if (!response.ok) throw new Error("Помилка при завантаженні курсів");
                return response.json();
              })
              .then(courses => {
                courses.forEach(course => {
                  const option = document.createElement("option");
                  option.value = course.id;
                  option.textContent = course.name;
                  courseSelect.appendChild(option);
                });
              })
              .catch(error => {
                console.error("Помилка:", error);
                alert("Не вдалося завантажити курси");
              });
    }
    function logout() {
    fetch('/logout', {
      method: 'POST'
    }).then(() => {
      window.location.href = 'index.jsp';
    }).catch(() => {
      alert('Помилка при виході');
    });
  }
    function filterUsers() {
      const role = document.getElementById('filterRole').value;
      const userList = document.getElementById('userList');
      userList.innerHTML = 'Завантаження...';

      const url = role === "All" ? '/proba_war_exploded/admin/getUsers' : `/proba_war_exploded/admin/getUsers?role=${role}`;

      fetch(url)
              .then(response => {
                if (!response.ok) {
                  throw new Error('Помилка сервера');
                }
                return response.json();
              })
              .then(data => {
                if (data.length === 0) {
                  userList.innerHTML = '<p>Користувачів не знайдено.</p>';
                  return;
                }

                // Створення HTML-таблиці
                let html = '<table border="1" style="width:100%; border-collapse: collapse; text-align:left;">';
                html += '<tr><th>ID</th><th>ПІБ</th><th>Email</th><th>Роль</th></tr>';

                data.forEach(user => {
                  html += `<tr>
                  <td>${user.id}</td>
                  <td>${user.name}</td>
                  <td>${user.email}</td>
                  <td>${user.role}</td>
                </tr>`;
                });

                html += '</table>';
                userList.innerHTML = html;
              })
              .catch(error => {
                console.error('Помилка при отриманні користувачів:', error);
                userList.innerHTML = '<p>Не вдалося отримати дані.</p>';
              });
    }
    // При завантаженні сторінки показати всіх користувачів
    document.addEventListener("DOMContentLoaded", () => {
      filterUsers();
    });

</script>

</body>
</html>
